<div class="clock-wrapper">
    <div class="clock">

        <div *ngFor="let element of grid" class="square">
            <div class="content">
                <div class="table">
                    <div class="table-cell" [style.color]="getColor(element.index)">
                        {{ element.value }}
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>
